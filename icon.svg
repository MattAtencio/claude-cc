<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d0019"/>
    </linearGradient>

    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>

    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="bigGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.2"/>

  <!-- Center hub glow -->
  <circle cx="256" cy="240" r="70" fill="#a855f7" opacity="0.08" filter="url(#bigGlow)"/>

  <!-- Orbital ring -->
  <circle cx="256" cy="240" r="155" fill="none" stroke="url(#purple)" stroke-width="3" opacity="0.35"/>

  <!-- Three connection lines from center to terminals -->
  <line x1="256" y1="185" x2="256" y2="112" stroke="#22c55e" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="210" y1="262" x2="138" y2="330" stroke="#f59e0b" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="302" y1="262" x2="374" y2="330" stroke="#ef4444" stroke-width="4" opacity="0.6" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="256" cy="240" r="56" fill="#1a0533" stroke="url(#purple)" stroke-width="4" filter="url(#glow)"/>

  <!-- CC text -->
  <text x="256" y="255" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="42" fill="url(#purple)" letter-spacing="2">CC</text>

  <!-- Terminal 1 - Top center (green/active) -->
  <g transform="translate(256, 95)" filter="url(#glow)">
    <rect x="-36" y="-24" width="72" height="48" rx="8" fill="#0d1117" stroke="url(#green)" stroke-width="3"/>
    <!-- Terminal lines -->
    <rect x="-24" y="-12" width="32" height="4" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="-24" y="-2" width="44" height="4" rx="2" fill="#22c55e" opacity="0.5"/>
    <rect x="-24" y="8" width="22" height="4" rx="2" fill="#22c55e" opacity="0.7"/>
  </g>

  <!-- Terminal 2 - Bottom left (amber/idle) -->
  <g transform="translate(124, 348)" filter="url(#glow)">
    <rect x="-36" y="-24" width="72" height="48" rx="8" fill="#0d1117" stroke="url(#amber)" stroke-width="3"/>
    <rect x="-24" y="-12" width="38" height="4" rx="2" fill="#f59e0b" opacity="0.8"/>
    <rect x="-24" y="-2" width="26" height="4" rx="2" fill="#f59e0b" opacity="0.4"/>
    <rect x="-24" y="8" width="44" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Terminal 3 - Bottom right (red/blocked) -->
  <g transform="translate(388, 348)" filter="url(#glow)">
    <rect x="-36" y="-24" width="72" height="48" rx="8" fill="#0d1117" stroke="url(#red)" stroke-width="3"/>
    <rect x="-24" y="-12" width="30" height="4" rx="2" fill="#ef4444" opacity="0.7"/>
    <rect x="-24" y="-2" width="44" height="4" rx="2" fill="#ef4444" opacity="0.4"/>
    <rect x="-24" y="8" width="18" height="4" rx="2" fill="#ef4444" opacity="0.8"/>
  </g>

  <!-- Status dots on terminals -->
  <circle cx="286" cy="77" r="6" fill="url(#green)"/>
  <circle cx="154" cy="330" r="6" fill="url(#amber)"/>
  <circle cx="418" cy="330" r="6" fill="url(#red)"/>

  <!-- Orbital accent dots -->
  <circle cx="402" cy="167" r="5" fill="url(#purple)" opacity="0.6"/>
  <circle cx="110" cy="167" r="5" fill="url(#purple)" opacity="0.6"/>
  <circle cx="256" cy="395" r="5" fill="url(#purple)" opacity="0.4"/>
</svg>
